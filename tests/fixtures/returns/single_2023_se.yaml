# Std ded (Single 2023) = 13850 → taxable_pre_qbi = 41911.13
# QBI ded = min(60000 × 20%, 41911.13 × 20%) = 8382.23
# Taxable = 33528.90
# Ordinary tax: 10% × 11000 + 12% × 22528.90 = 1100 + 2703.47 = 3803.47
# Total tax = 3803.47 + 8477.73 = 12281.20
