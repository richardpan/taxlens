year: 2023
notes: "WA has no wage income tax. Models 7% LT capital-gains excise tax over per-status threshold."
standard_deduction: { single: 0, mfj: 0, mfs: 0, hoh: 0, qss: 0 }
ordinary_brackets:
  single: [[0, 0]]
  mfj:    [[0, 0]]
  mfs:    [[0, 0]]
  hoh:    [[0, 0]]
  qss:    [[0, 0]]
capital_gains_excise_tax:
  rate: 0.07
  threshold_by_status:
    single: 250000
    mfj:    250000
    mfs:    125000
    hoh:    250000
    qss:    250000
