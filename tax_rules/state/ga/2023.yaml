# Georgia individual income tax — TY 2023.
# 2023 used the OLD graduated system (1%-5.75%); the flat tax under
# HB 1437 didn't take effect until TY 2024.
# Source: GA Form 500 2023 instructions, O.C.G.A. §48-7-20.

state: GA
year: 2023

standard_deduction:
  single: 5400
  mfj:    7100
  mfs:    3550
  hoh:    5400
  qss:    7100

