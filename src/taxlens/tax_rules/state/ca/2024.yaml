# California Personal Income Tax — TY 2024.
# Source: FTB 540 instructions; brackets per Rev. & Tax. Code §17041.
# CA does NOT have a preferential rate for long-term capital gains or qualified
# dividends — they are taxed as ordinary income. The 1% mental health surcharge
# (over $1M, Prop. 63) is omitted in v1 (we'll add when a fixture needs it).

state: CA
year: 2024
notes: |
  - Capital gains and qualified dividends are taxed as ordinary income.
  - Standard deduction values are CA-specific.
  - The 1% Mental Health Services Tax above $1M of taxable income is NOT
    modeled in v1. Add when a fixture requires it.

standard_deduction:
  single: 5540
  mfj:    11080
  mfs:    5540
  hoh:    11080
  qss:    11080

