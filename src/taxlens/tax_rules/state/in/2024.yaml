# Indiana individual adjusted gross income tax — TY 2024.
# Flat 3.05% on Indiana AGI (down from 3.15% in 2023; further reductions
# scheduled through 2027). Source: IN DOR IT-40 instructions.
# Indiana uses federal AGI minus exemptions ($1,000/person + $1,500/dependent)
# rather than a standard deduction; we approximate the personal-exemption
# baseline as the standard-deduction slot.
state: IN
year: 2024
standard_deduction:
  single: 1000
  mfj:    2000
  mfs:    1000
  hoh:    1000
  qss:    2000
ordinary_brackets:
  single: [[0, 0.0305]]
  mfj:    [[0, 0.0305]]
  mfs:    [[0, 0.0305]]
  hoh:    [[0, 0.0305]]
  qss:    [[0, 0.0305]]
