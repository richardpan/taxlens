# Maryland individual income tax — TY 2024.
# Source: MD 502 instructions, Md. Code, Tax-Gen §10-105.
# State income tax (county piggyback tax of 2.25%-3.20% NOT modeled here).
# LTCG taxed as ordinary income.

state: MD
year: 2024
notes: |
  State portion only — MD counties levy an additional 2.25%-3.20% piggyback
  income tax which is not modeled here.

standard_deduction:
  single: 2550
  mfj:    5150
  mfs:    2550
  hoh:    2550
  qss:    5150

ordinary_brackets:
  single:
    - [0,       0.02]
    - [1000,    0.03]
    - [2000,    0.04]
    - [3000,    0.0475]
    - [100000,  0.05]
    - [125000,  0.0525]
    - [150000,  0.055]
    - [250000,  0.0575]
