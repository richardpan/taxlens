# Federal tax rules for TY 2022.
# Sources: IRS Rev. Proc. 2021-45 (inflation adjustments).
# ARPA's expanded CTC was 2021-only; 2022 reverts to TCJA baseline.

year: 2022

standard_deduction:
  single: 12950
  mfj: 25900
  mfs: 12950
  hoh: 19400
  qss: 25900

ordinary_brackets:
  single:
    - [0,        0.10]
    - [10275,    0.12]
    - [41775,    0.22]
    - [89075,    0.24]
    - [170050,   0.32]
    - [215950,   0.35]
    - [539900,   0.37]
  mfj:
    - [0,        0.10]
    - [20550,    0.12]
    - [83550,    0.22]
    - [178150,   0.24]
    - [340100,   0.32]
    - [431900,   0.35]
    - [647850,   0.37]
  mfs:
    - [0,        0.10]
    - [10275,    0.12]
    - [41775,    0.22]
    - [89075,    0.24]
    - [170050,   0.32]
    - [215950,   0.35]
    - [323925,   0.37]
  hoh:
    - [0,        0.10]
    - [14650,    0.12]
    - [55900,    0.22]
    - [89050,    0.24]
    - [170050,   0.32]
    - [215950,   0.35]
    - [539900,   0.37]

qualified_brackets:
  single: [[0, 0.00], [41675, 0.15], [459750, 0.20]]
  mfj:    [[0, 0.00], [83350, 0.15], [517200, 0.20]]
  mfs:    [[0, 0.00], [41675, 0.15], [258600, 0.20]]
  hoh:    [[0, 0.00], [55800, 0.15], [488500, 0.20]]

se_tax:
  net_earnings_multiplier: 0.9235
  social_security_rate: 0.124
  social_security_wage_base: 147000
  medicare_rate: 0.029
  deductible_fraction: 0.5

additional_medicare:
  rate: 0.009
  threshold:
    single: 200000
    mfj:    250000
    mfs:    125000
    hoh:    200000
    qss:    250000

niit:
  rate: 0.038
  threshold:
    single: 200000
    mfj:    250000
    mfs:    125000
    hoh:    200000
    qss:    250000

ctc:
  per_qualifying_child: 2000
  refundable_per_child: 1500
  phaseout_start:
    single: 200000
    mfj:    400000
    mfs:    200000
    hoh:    200000
    qss:    400000
  phaseout_per_1000_agi: 50

amt:
  rate_low: 0.26
  rate_high: 0.28
  rate_break:
    single: 206100
    mfj:    206100
    mfs:    103050
    hoh:    206100
    qss:    206100
  exemption:
    single: 75900
    mfj:    118100
    mfs:    59050
    hoh:    75900
    qss:    118100
  exemption_phaseout_start:
    single: 539900
    mfj:    1079800
    mfs:    539900
    hoh:    539900
    qss:    1079800
  phaseout_rate: 0.25

collectibles_rate: 0.28
unrecaptured_1250_rate: 0.25

qbi:
  rate: 0.20
  threshold:
    single: 170050
    mfj:    340100
    mfs:    170050
    hoh:    170050
    qss:    340100
  phaseout:     50000
  phaseout_mfj: 100000

contribution_limits:
  k401_elective_deferral:      20500
  k401_catchup_50plus:          6500
  ira_contribution:             6000
  ira_catchup_50plus:           1000
  hsa_self:                     3650
  hsa_family:                   7300
  hsa_catchup_55plus:           1000
  roth_ira_phaseout_start:
    single: 129000
    mfj:    204000
    mfs:    0
    hoh:    129000
    qss:    204000
  roth_ira_phaseout_end:
    single: 144000
    mfj:    214000
    mfs:    10000
    hoh:    144000
    qss:    214000

# Social Security taxability (§86) - thresholds unchanged since 1993.
social_security:
  base_threshold:
    single: 25000
    mfj:    32000
    mfs:    0
    hoh:    25000
    qss:    25000
  second_threshold:
    single: 34000
    mfj:    44000
    mfs:    0
    hoh:    34000
    qss:    34000
  first_tier_rate:  0.50
  second_tier_rate: 0.85


# Traditional IRA deduction (§219) — active-participant phaseout.
ira_deduction:
  contribution_limit:
    under_50:   6000
    fifty_plus: 7000
  phaseout_covered:
    single: { start: 68000, end: 78000 }
    hoh:    { start: 68000, end: 78000 }
    mfj:    { start: 109000, end: 129000 }
    qss:    { start: 109000, end: 129000 }
    mfs:    { start: 0,     end: 10000 }
  phaseout_spouse_covered_only:
    mfj:    { start: 204000, end: 214000 }
    mfs:    { start: 0,     end: 10000 }

# Student loan interest deduction (§221).
student_loan_interest:
  max_deduction: 2500
  phaseout:
    single: { start: 70000, end: 85000 }
    hoh:    { start: 70000, end: 85000 }
    qss:    { start: 145000,  end: 175000 }
    mfj:    { start: 145000,  end: 175000 }
    mfs:    { disabled: true }
# Educator expense deduction (§62(a)(2)(D)).
educator_expense:
  per_educator_cap: 300

# Child & Dependent Care Credit (Form 2441).
dependent_care_credit:
  expense_cap_one:      3000
  expense_cap_two_plus: 6000
  refundable: false
  rate_tiers:
    - [15000, 0.35]
    - [17000, 0.34]
    - [19000, 0.33]
    - [21000, 0.32]
    - [23000, 0.31]
    - [25000, 0.30]
    - [27000, 0.29]
    - [29000, 0.28]
    - [31000, 0.27]
    - [33000, 0.26]
    - [35000, 0.25]
    - [37000, 0.24]
    - [39000, 0.23]
    - [41000, 0.22]
    - [43000, 0.21]
    - [45000, 0.20]
    - [99999999, 0.20]
# Residential Clean Energy Credit (Form 5695 Part I).
residential_clean_energy:
  rate: 0.30
# Clean Vehicle Credit (Form 8936) — MAGI cap only enforced 2023+.
clean_vehicle:
  enforce: false
  new_magi_cap:
    single: 150000
    hoh:    225000
    mfj:    300000
    qss:    300000
    mfs:    150000
  used_magi_cap:
    single: 75000
    hoh:    112500
    mfj:    150000
    qss:    150000
    mfs:    75000
