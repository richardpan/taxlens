# Premium Tax Credit (Form 8962). FPL values are 2022 (used by TY 2023 returns).
ptc:
  fpl_base: 13590
  fpl_increment_per_person: 4720
  applicable_figure:
    - [0,   150,  0.000, 0.000]
    - [150, 200,  0.000, 0.020]
    - [200, 250,  0.020, 0.040]
    - [250, 300,  0.040, 0.060]
    - [300, 400,  0.060, 0.085]
    - [400, 99999, 0.085, 0.085]
  repayment_limits:
    - {below_pct_fpl: 200, single: 350,  family: 700}
    - {below_pct_fpl: 300, single: 900,  family: 1800}
    - {below_pct_fpl: 400, single: 1500, family: 3000}


# Social Security taxability (§86) - thresholds unchanged since 1993.
social_security:
  base_threshold:
    single: 25000
    mfj:    32000
    mfs:    0
    hoh:    25000
    qss:    25000
  second_threshold:
    single: 34000
    mfj:    44000
    mfs:    0
    hoh:    34000
    qss:    34000
  first_tier_rate:  0.50
  second_tier_rate: 0.85


# Traditional IRA deduction (§219) — active-participant phaseout.
ira_deduction:
  contribution_limit:
    under_50:   6500
    fifty_plus: 7500
  phaseout_covered:
    single: { start: 73000, end: 83000 }
    hoh:    { start: 73000, end: 83000 }
    mfj:    { start: 116000, end: 136000 }
    qss:    { start: 116000, end: 136000 }
    mfs:    { start: 0,     end: 10000 }
  phaseout_spouse_covered_only:
    mfj:    { start: 218000, end: 228000 }
    mfs:    { start: 0,     end: 10000 }
