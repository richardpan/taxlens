# Federal tax rules for TY 2018.
# Sources: IRS Rev. Proc. 2018-18 (post-TCJA).
# FIRST POST-TCJA YEAR — std deduction nearly doubled, personal exemption
# eliminated, SALT $10k cap introduced, CTC doubled to $2k, QBI §199A new.

