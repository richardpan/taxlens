# Federal tax rules for TY 2015 — PRE-TCJA.
# Sources: IRS Rev. Proc. 2014-61.

year: 2015
nol_full_offset: true

standard_deduction:
  single: 6300
  mfj: 12600
  mfs: 6300
  hoh: 9250
  qss: 12600

ordinary_brackets:
  single:
    - [0,        0.10]
    - [9225,     0.15]
    - [37450,    0.25]
    - [90750,    0.28]
    - [189300,   0.33]
    - [411500,   0.35]
    - [413200,   0.396]
  mfj:
    - [0,        0.10]
    - [18450,    0.15]
    - [74900,    0.25]
    - [151200,   0.28]
    - [230450,   0.33]
    - [411500,   0.35]
    - [464850,   0.396]
  mfs:
    - [0,        0.10]
    - [9225,     0.15]
    - [37450,    0.25]
    - [75600,    0.28]
    - [115225,   0.33]
    - [205750,   0.35]
    - [232425,   0.396]
  hoh:
    - [0,        0.10]
    - [13150,    0.15]
    - [50200,    0.25]
    - [129600,   0.28]
    - [209850,   0.33]
    - [411500,   0.35]
    - [439000,   0.396]

qualified_brackets:
  single: [[0, 0.00], [37450, 0.15], [413200, 0.20]]
  mfj:    [[0, 0.00], [74900, 0.15], [464850, 0.20]]
  mfs:    [[0, 0.00], [37450, 0.15], [232425, 0.20]]
  hoh:    [[0, 0.00], [50200, 0.15], [439000, 0.20]]

se_tax:
  net_earnings_multiplier: 0.9235
  social_security_rate: 0.124
  social_security_wage_base: 118500
  medicare_rate: 0.029
  deductible_fraction: 0.5

additional_medicare:
  rate: 0.009
  threshold:
    single: 200000
    mfj:    250000
    mfs:    125000
    hoh:    200000
    qss:    250000

niit:
  rate: 0.038
  threshold:
    single: 200000
    mfj:    250000
    mfs:    125000
    hoh:    200000
    qss:    250000

ctc:
  per_qualifying_child: 1000
  per_other_dependent: 0
  refundable_per_child: 1000
  actc_no_kid_cap: true
  actc_earned_threshold: 3000
  actc_rate: 0.15
  phaseout_start:
    single: 75000
    mfj:    110000
    mfs:    55000
    hoh:    75000
    qss:    110000
  phaseout_per_1000_agi: 50

personal_exemption:
  amount: 4000
  phaseout_start:
    single: 258250
    mfj:    309900
    mfs:    154950
    hoh:    284050
    qss:    309900
  phaseout_complete:
    single: 380750
    mfj:    432400
    mfs:    216200
    hoh:    406550
    qss:    432400

pease:
  threshold:
    single: 258250
    mfj:    309900
    mfs:    154950
    hoh:    284050
    qss:    309900
  rate: 0.03
  max_reduction: 0.80

amt:
  rate_low: 0.26
  rate_high: 0.28
  rate_break:
    single: 185400
    mfj:    185400
    mfs:    92700
    hoh:    185400
    qss:    185400
  exemption:
    single: 53600
    mfj:    83400
    mfs:    41700
    hoh:    53600
    qss:    83400
  exemption_phaseout_start:
    single: 119200
    mfj:    158900
    mfs:    79450
    hoh:    119200
    qss:    158900
  phaseout_rate: 0.25

collectibles_rate: 0.28
unrecaptured_1250_rate: 0.25

contribution_limits:
  k401_elective_deferral:      18000
  k401_catchup_50plus:          6000
  ira_contribution:             5500
  ira_catchup_50plus:           1000
  hsa_self:                     3350
  hsa_family:                   6650
  hsa_catchup_55plus:           1000
  roth_ira_phaseout_start:
    single: 116000
    mfj:    183000
    mfs:    0
    hoh:    116000
    qss:    183000
  roth_ira_phaseout_end:
    single: 131000
    mfj:    193000
    mfs:    10000
    hoh:    131000
    qss:    193000

# Social Security taxability (§86) - thresholds unchanged since 1993.
social_security:
  base_threshold:
    single: 25000
    mfj:    32000
    mfs:    0
    hoh:    25000
    qss:    25000
  second_threshold:
    single: 34000
    mfj:    44000
    mfs:    0
    hoh:    34000
    qss:    34000
  first_tier_rate:  0.50
  second_tier_rate: 0.85


# Traditional IRA deduction (§219) — active-participant phaseout.
ira_deduction:
  contribution_limit:
    under_50:   5500
    fifty_plus: 6500
  phaseout_covered:
    single: { start: 61000, end: 71000 }
    hoh:    { start: 61000, end: 71000 }
    mfj:    { start: 98000, end: 118000 }
    qss:    { start: 98000, end: 118000 }
    mfs:    { start: 0,     end: 10000 }
  phaseout_spouse_covered_only:
    mfj:    { start: 183000, end: 193000 }
    mfs:    { start: 0,     end: 10000 }

# Student loan interest deduction (§221).
student_loan_interest:
  max_deduction: 2500
  phaseout:
    single: { start: 65000, end: 80000 }
    hoh:    { start: 65000, end: 80000 }
    qss:    { start: 130000,  end: 160000 }
    mfj:    { start: 130000,  end: 160000 }
    mfs:    { disabled: true }
# Educator expense deduction (§62(a)(2)(D)).
educator_expense:
  per_educator_cap: 250

# Child & Dependent Care Credit (Form 2441).
dependent_care_credit:
  expense_cap_one:      3000
  expense_cap_two_plus: 6000
  refundable: false
  rate_tiers:
    - [15000, 0.35]
    - [17000, 0.34]
    - [19000, 0.33]
    - [21000, 0.32]
    - [23000, 0.31]
    - [25000, 0.30]
    - [27000, 0.29]
    - [29000, 0.28]
    - [31000, 0.27]
    - [33000, 0.26]
    - [35000, 0.25]
    - [37000, 0.24]
    - [39000, 0.23]
    - [41000, 0.22]
    - [43000, 0.21]
    - [45000, 0.20]
    - [99999999, 0.20]
# Residential Clean Energy Credit (Form 5695 Part I).
residential_clean_energy:
  rate: 0.30
# Clean Vehicle Credit (Form 8936) — MAGI cap only enforced 2023+.
clean_vehicle:
  enforce: false
  new_magi_cap:
    single: 150000
    hoh:    225000
    mfj:    300000
    qss:    300000
    mfs:    150000
  used_magi_cap:
    single: 75000
    hoh:    112500
    mfj:    150000
    qss:    150000
    mfs:    75000
