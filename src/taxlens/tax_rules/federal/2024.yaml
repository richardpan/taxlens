# Federal tax rules for TY 2024.
# Sources: IRS Rev. Proc. 2023-34, Forms 1040 / Sch SE / Form 8959 / Form 8960.
# All money values are USD. Rates are decimals (0.10 = 10%).

year: 2024

standard_deduction:
  single: 14600
  mfj: 29200
  mfs: 14600
  hoh: 21900
  qss: 29200

# Ordinary income brackets. Each bracket: [lower_inclusive, rate].
# Implicit upper bound = next bracket's lower bound; last bracket has no upper bound.
ordinary_brackets:
  single:
    - [0,        0.10]
    - [11600,    0.12]
    - [47150,    0.22]
    - [100525,   0.24]
    - [191950,   0.32]
    - [243725,   0.35]
    - [609350,   0.37]
  mfj:
    - [0,        0.10]
    - [23200,    0.12]
    - [94300,    0.22]
    - [201050,   0.24]
    - [383900,   0.32]
    - [487450,   0.35]
    - [731200,   0.37]
  mfs:
    - [0,        0.10]
    - [11600,    0.12]
    - [47150,    0.22]
    - [100525,   0.24]
    - [191950,   0.32]
    - [243725,   0.35]
    - [365600,   0.37]
  hoh:
    - [0,        0.10]
    - [16550,    0.12]
    - [63100,    0.22]
    - [100500,   0.24]
    - [191950,   0.32]
    - [243700,   0.35]
    - [609350,   0.37]

# Qualified dividends + LTCG. Same bracket model.
qualified_brackets:
  single: [[0, 0.00], [47025, 0.15], [518900, 0.20]]
  mfj:    [[0, 0.00], [94050, 0.15], [583750, 0.20]]
  mfs:    [[0, 0.00], [47025, 0.15], [291875, 0.20]]
  hoh:    [[0, 0.00], [63000, 0.15], [551350, 0.20]]

# Self-employment tax (Schedule SE).
se_tax:
  net_earnings_multiplier: 0.9235     # SE income × 0.9235 = SE base
  social_security_rate: 0.124         # 12.4%
  social_security_wage_base: 168600
  medicare_rate: 0.029                # 2.9%
  # Deductible portion = 50% of SE tax (above-the-line adjustment).
  deductible_fraction: 0.5

# Additional Medicare Tax (Form 8959). Applies to wages + SE earnings above threshold.
additional_medicare:
  rate: 0.009                         # 0.9%
  threshold:
    single: 200000
    mfj:    250000
    mfs:    125000
    hoh:    200000
    qss:    250000

# Net Investment Income Tax (Form 8960).
niit:
  rate: 0.038                         # 3.8%
  threshold:
    single: 200000
    mfj:    250000
    mfs:    125000
    hoh:    200000
    qss:    250000

# Child Tax Credit (simplified — phaseout omitted; v1 engine adds full phaseout).
ctc:
  per_qualifying_child: 2000
  refundable_per_child: 1700          # ACTC refundable ceiling (Form 8812)
  phaseout_start:
    single: 200000
    mfj:    400000
    mfs:    200000
    hoh:    200000
    qss:    400000
  phaseout_per_1000_agi: 50           # $50 reduction per $1k AGI over threshold

# AMT (Form 6251). 26% on AMTI up to threshold, 28% above. Exemption phases out
# at 25¢ per $1 of AMTI over the phaseout start (i.e. $1 lost per $4 excess).
amt:
  rate_low: 0.26
  rate_high: 0.28
  rate_break:
    single: 232600
    mfj:    232600
    mfs:    116300
    hoh:    232600
    qss:    232600
  exemption:
    single: 85700
    mfj:    133300
    mfs:    66650
    hoh:    85700
    qss:    133300
  exemption_phaseout_start:
    single: 609350
    mfj:    1218700
    mfs:    609350
    hoh:    609350
    qss:    1218700
  phaseout_rate: 0.25

# Schedule D worksheet cap rates (can override per-year if statute changes).
collectibles_rate: 0.28
unrecaptured_1250_rate: 0.25

# QBI deduction (Section 199A) — Form 8995/8995-A. Simplified phaseout model:
qbi:
  rate: 0.20
  threshold:
    single: 241950
    mfj:    483900
    mfs:    241950
    hoh:    241950
    qss:    483900
  phaseout:     50000
  phaseout_mfj: 100000

# Annual contribution / deferral limits used by the Tax Savings Advisor.
contribution_limits:
  k401_elective_deferral:      23000
  k401_catchup_50plus:          7500
  ira_contribution:             7000
  ira_catchup_50plus:           1000
  hsa_self:                     4150
  hsa_family:                   8300
  hsa_catchup_55plus:           1000
  roth_ira_phaseout_start:
    single: 146000
    mfj:    230000
    mfs:    0
    hoh:    146000
    qss:    230000
  roth_ira_phaseout_end:
    single: 161000
    mfj:    240000
    mfs:    10000
    hoh:    161000
    qss:    240000

# Earned Income Tax Credit (Schedule EIC). Refundable.
# Source: Rev. Proc. 2023-34 §3.06. MFS not allowed (we return 0).
eitc:
  investment_income_limit: 11600
  parameters:
    "0":
      earned_income_amount: 8260
      max_credit: 632
      phaseout_rate: 0.0765
      phaseout_start: 10330
      phaseout_start_joint: 17250
      completed_phaseout: 18591
      completed_phaseout_joint: 25511
    "1":
      earned_income_amount: 12390
      max_credit: 4213
      phaseout_rate: 0.1598
      phaseout_start: 22720
      phaseout_start_joint: 29640
      completed_phaseout: 49084
      completed_phaseout_joint: 56004
    "2":
      earned_income_amount: 17400
      max_credit: 6960
      phaseout_rate: 0.2106
      phaseout_start: 22720
      phaseout_start_joint: 29640
      completed_phaseout: 55768
      completed_phaseout_joint: 62688
    "3":
      earned_income_amount: 17400
      max_credit: 7830
      phaseout_rate: 0.2106
      phaseout_start: 22720
      phaseout_start_joint: 29640
      completed_phaseout: 59899
      completed_phaseout_joint: 66819

# Education credits (Form 8863). Phaseouts are MAGI-based.
# AOTC: 100% of first $2,000 + 25% of next $2,000 = $2,500 max per student,
#       40% refundable, 60% nonrefundable. MFS disallowed.
# LLC: 20% of expenses up to $10,000 = $2,000 max per return, nonrefundable.
# Both share the same phaseout window for TY 2024 (per Form 8863 instructions).
education_credits:
  aotc:
    max_expenses_per_student: 4000
    first_tier_rate: 1.00
    first_tier_cap: 2000
    second_tier_rate: 0.25
    refundable_fraction: 0.40
  llc:
    rate: 0.20
    expense_cap: 10000
  phaseout:
    single: [80000, 90000]
    mfj:    [160000, 180000]
    mfs:    [0, 0]               # MFS not allowed
    hoh:    [80000, 90000]
    qss:    [160000, 180000]

# Saver's Credit (Retirement Savings Contributions Credit, Form 8880).
# Nonrefundable. Max contributions counted = $2,000 per person.
# AGI-tiered credit rate: 50%, 20%, 10%, or 0% based on filing status.
# Source: Rev. Proc. 2023-34 §3.21.
savers_credit:
  max_contribution_per_person: 2000
  rates:
    single:
      - [23000, 0.50]
      - [25000, 0.20]
      - [38250, 0.10]
    mfj:
      - [46000, 0.50]
      - [50000, 0.20]
      - [76500, 0.10]
    mfs:
      - [23000, 0.50]
      - [25000, 0.20]
      - [38250, 0.10]
    hoh:
      - [34500, 0.50]
      - [37500, 0.20]
      - [57375, 0.10]
    qss:
      - [46000, 0.50]
      - [50000, 0.20]
      - [76500, 0.10]

# Premium Tax Credit (Form 8962). FPL values are 2023 (used by TY 2024 returns).
# Applicable Figure curve reflects ARPA/IRA extension through 2025 (no 400% cliff,
# 8.5% cap above 400% FPL). 48 contiguous states; AK/HI variants in v1.x.
ptc:
  fpl_base: 14580                 # 1-person 2023 FPL, 48 states
  fpl_increment_per_person: 5140
  applicable_figure:
    # Piecewise-linear: [pct_FPL_low, pct_FPL_high, rate_low, rate_high]
    - [0,   150,  0.000, 0.000]
    - [150, 200,  0.000, 0.020]
    - [200, 250,  0.020, 0.040]
    - [250, 300,  0.040, 0.060]
    - [300, 400,  0.060, 0.085]
    - [400, 99999, 0.085, 0.085]
  # APTC repayment limits if PTC < APTC. Below 400% FPL: capped; ≥400%: full amount.
  repayment_limits:
    - {below_pct_fpl: 200, single: 375,  family: 750}
    - {below_pct_fpl: 300, single: 975,  family: 1950}
    - {below_pct_fpl: 400, single: 1625, family: 3250}


# Social Security taxability (§86) - thresholds unchanged since 1993.
social_security:
  base_threshold:
    single: 25000
    mfj:    32000
    mfs:    0
    hoh:    25000
    qss:    25000
  second_threshold:
    single: 34000
    mfj:    44000
    mfs:    0
    hoh:    34000
    qss:    34000
  first_tier_rate:  0.50
  second_tier_rate: 0.85


# Traditional IRA deduction (§219) — active-participant phaseout.
ira_deduction:
  contribution_limit:
    under_50:   7000
    fifty_plus: 8000
  phaseout_covered:
    single: { start: 77000, end: 87000 }
    hoh:    { start: 77000, end: 87000 }
    mfj:    { start: 123000, end: 143000 }
    qss:    { start: 123000, end: 143000 }
    mfs:    { start: 0,     end: 10000 }
  phaseout_spouse_covered_only:
    mfj:    { start: 230000, end: 240000 }
    mfs:    { start: 0,     end: 10000 }

# Student loan interest deduction (§221).
student_loan_interest:
  max_deduction: 2500
  phaseout:
    single: { start: 80000, end: 95000 }
    hoh:    { start: 80000, end: 95000 }
    qss:    { start: 165000,  end: 195000 }
    mfj:    { start: 165000,  end: 195000 }
    mfs:    { disabled: true }
# Educator expense deduction (§62(a)(2)(D)).
educator_expense:
  per_educator_cap: 300
