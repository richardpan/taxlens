# Federal tax rules for TY 2020.
# Sources: IRS Rev. Proc. 2019-44.
# CARES Act items: $300 above-line charitable (single)/$600 (MFJ); $10,200
# UI exclusion (ARPA, retroactive); EIPs not income. Not modeled at engine
# level — user should supply pre-adjusted figures or use the Advisor's notes.

