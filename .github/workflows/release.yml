name: release

# Cross-platform installer build. Triggers on any v*.*.* tag push, or
# manually via the GitHub UI. Produces:
#   - Windows:  TaxLens-Setup-x.y.z.exe       (NSIS installer)
#   - macOS:    TaxLens-x.y.z.dmg + .zip      (universal2 if runner allows)
#   - Linux:    TaxLens-x.y.z.AppImage
# and uploads them as assets on the matching GitHub Release.
#
# Installers are NOT code-signed in this workflow — see docs/signing.md for
# the EV / notarytool flow that swaps in secrets-based signing.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.4.0). Must already exist."
        required: true

permissions:
  contents: write  # needed to upload release assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_glob: "desktop/dist/*.exe"
          - os: macos-latest
            artifact_glob: "desktop/dist/*.dmg"
          - os: ubuntu-latest
            artifact_glob: "desktop/dist/*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps + project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Run tests
        run: pytest -q

      - name: Build backend executable (PyInstaller)
        run: python desktop/scripts/build_backend.py

      - name: Install electron-builder deps
        working-directory: desktop
        run: npm install

      - name: Build installer
        working-directory: desktop
        env:
          # electron-builder reads GH_TOKEN to optionally publish; we upload
          # manually below so it stays unset to avoid double-publish.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --publish=never

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          # Create release if missing (workflow_dispatch path) — ignore failure if it exists.
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes "Automated build."
          shopt -s nullglob
          for f in ${{ matrix.artifact_glob }}; do
            echo "Uploading $f"
            gh release upload "$tag" "$f" --clobber
          done

      - name: Upload build artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
